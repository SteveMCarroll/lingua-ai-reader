name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install api deps
        run: npm --prefix api ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build api
        run: npm --prefix api run build
